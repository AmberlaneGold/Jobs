<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jobs Quick Entry</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f4f4;
}

.wrap {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 16px;
  margin-top: 60px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  text-align: center;
}

h2 {
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

#rowDisplay {
  margin-top: 10px;
  font-size: 14px;
  color: #666;
}

#status {
  margin-top: 10px;
  font-size: 13px;
  color: #666;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="card">

    <h2>Jobs Quick Entry</h2>

    <div id="rowDisplay">Row: 4</div>

    <input id="jobNumber" type="text" placeholder="Job Number (Column B)" autocomplete="off">
    <input id="cost" type="number" placeholder="$ Cost (Column G)" autocomplete="off">

    <div id="status"></div>

  </div>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx1JaH7BO7PlsCpxQDIc_y96tnUYAzby-AOYF8EyUNf-EaF8NwOcyQXf0s6wYyCbCGLsA/exec";

let currentRow = 4;

/**
 * 🚀 SAVE FUNCTION (WAIT FOR CONFIRMATION)
 */
async function saveAndNext() {
  const jobNumber = document.getElementById("jobNumber").value;
  const cost = document.getElementById("cost").value;

  document.getElementById("status").innerText = "Saving...";

  const url =
    SCRIPT_URL +
    "?row=" + currentRow +
    "&jobNumber=" + encodeURIComponent(jobNumber) +
    "&cost=" + encodeURIComponent(cost);

  try {
    const res = await fetch(url, { method: "GET" });
    const data = await res.json();

    if (data.success) {
      currentRow++;

      document.getElementById("rowDisplay").innerText =
        "Row: " + currentRow;

      document.getElementById("jobNumber").value = "";
      document.getElementById("cost").value = "";

      document.getElementById("jobNumber").focus();

      document.getElementById("status").innerText =
        "Saved ✔ Row " + (currentRow - 1);
    } else {
      document.getElementById("status").innerText =
        "Error saving row";
    }

  } catch (err) {
    document.getElementById("status").innerText =
      "Network error";
  }
}

/**
 * ⌨️ ENTER KEY HANDLING (FIXED RELIABILITY)
 */
document.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();

    // small safety check so empty accidental enter doesn't spam
    const job = document.getElementById("jobNumber").value;
    const cost = document.getElementById("cost").value;

    if (job === "" && cost === "") return;

    saveAndNext();
  }
});

/**
 * 📱 MOBILE FOCUS FIX
 */
window.onload = () => {
  document.getElementById("jobNumber").focus();
};
</script>

</body>
</html>
